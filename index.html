<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CEEZY x SWAEN | Site Under Development</title>
    <!-- Google Fonts & Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0A0A0C;
            font-family: 'Inter', sans-serif;
            color: #E8E9F0;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        /* premium animated background */
        .bg-orb {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: radial-gradient(circle at 20% 30%, rgba(212,175,55,0.06) 0%, #0A0A0C 90%);
        }

        .bg-orb::before {
            content: '';
            position: absolute;
            width: 80vmax;
            height: 80vmax;
            background: radial-gradient(circle, rgba(212,175,55,0.1) 0%, rgba(0,0,0,0) 70%);
            top: -20%;
            left: -20%;
            animation: slowDrift 26s infinite alternate ease-in-out;
        }

        .bg-orb::after {
            content: '';
            position: absolute;
            width: 70vmax;
            height: 70vmax;
            background: radial-gradient(circle, rgba(180,140,30,0.06) 0%, rgba(0,0,0,0) 70%);
            bottom: -15%;
            right: -15%;
            animation: slowDriftReverse 30s infinite alternate ease-in-out;
        }

        @keyframes slowDrift {
            0% { transform: translate(0, 0) scale(1); opacity: 0.4; }
            100% { transform: translate(6%, 8%) scale(1.2); opacity: 0.7; }
        }

        @keyframes slowDriftReverse {
            0% { transform: translate(0, 0) scale(1); opacity: 0.3; }
            100% { transform: translate(-5%, -6%) scale(1.3); opacity: 0.6; }
        }

        /* main card */
        .glass-card {
            max-width: 680px;
            width: 90%;
            margin: 2rem auto;
            background: rgba(12, 12, 18, 0.6);
            backdrop-filter: blur(16px);
            border-radius: 56px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 30px 50px rgba(0,0,0,0.5), 0 0 0 1px rgba(212,175,55,0.1) inset;
            padding: 2.8rem 2rem;
            text-align: center;
            transition: all 0.3s;
        }

        /* brand */
        .brand {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 1.8rem;
            background: rgba(212,175,55,0.08);
            padding: 0.5rem 1.6rem;
            border-radius: 80px;
            backdrop-filter: blur(4px);
        }

        .brand i {
            font-size: 2rem;
            color: #D4AF37;
        }

        .brand h1 {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF 20%, #D4AF37 90%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        /* main icon */
        .construction-icon {
            font-size: 5rem;
            color: #D4AF37;
            margin: 0.5rem 0 1rem;
            display: inline-block;
            animation: gentlePulse 2.2s infinite ease-in-out;
        }

        @keyframes gentlePulse {
            0% { transform: scale(1); opacity: 0.8; text-shadow: 0 0 0px rgba(212,175,55,0); }
            50% { transform: scale(1.06); opacity: 1; text-shadow: 0 0 12px rgba(212,175,55,0.4); }
            100% { transform: scale(1); opacity: 0.8; text-shadow: 0 0 0px rgba(212,175,55,0); }
        }

        h2 {
            font-size: 2.6rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            letter-spacing: -0.02em;
            background: linear-gradient(130deg, #FFFFFF, #D4AF37);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .gold-divider {
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, #D4AF37, transparent);
            margin: 0.8rem auto 1.2rem;
            border-radius: 4px;
        }

        .message {
            font-size: 1.1rem;
            color: #C0C0D0;
            max-width: 460px;
            margin: 1rem auto 1.2rem;
            font-weight: 400;
            line-height: 1.6;
        }

        .status-badge {
            display: inline-block;
            background: rgba(212,175,55,0.15);
            border: 1px solid rgba(212,175,55,0.4);
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            margin: 1rem 0;
            backdrop-filter: blur(4px);
        }

        .status-badge i {
            margin-right: 6px;
            color: #D4AF37;
        }

        .footer-note {
            font-size: 0.7rem;
            color: #6a6a78;
            margin-top: 2rem;
            border-top: 1px solid rgba(212,175,55,0.2);
            padding-top: 1.2rem;
        }

        /* responsive */
        @media (max-width: 560px) {
            .glass-card {
                padding: 1.8rem 1.2rem;
            }
            h2 {
                font-size: 2rem;
            }
            .construction-icon {
                font-size: 3.8rem;
            }
            .brand h1 {
                font-size: 1.4rem;
            }
            .message {
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
<div class="bg-orb"></div>

<div class="glass-card">
    <!-- Brand -->
    <div class="brand">
        <i class="fas fa-gem"></i>
        <h1>CEEZY x SWAEN</h1>
    </div>

    <!-- animated icon -->
    <div class="construction-icon">
        <i class="fas fa-cogs"></i>
    </div>

    <h2>Website is under development</h2>
    <div class="gold-divider"></div>
    
    <p class="message">
        We're crafting an elevated digital ecosystem —<br>
        Wealth intelligence, advanced technology, and exclusive solutions.
    </p>

    <div class="status-badge">
        <i class="fas fa-hourglass-half"></i> Launching soon
    </div>

    <div class="footer-note">
        <i class="fas fa-crown" style="color: #D4AF37; opacity: 0.7;"></i> CEEZY x SWAEN — The future of financial & tech excellence
    </div>
</div>
</body>
</html>
